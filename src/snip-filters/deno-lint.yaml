name: "deno-lint"
version: 1
description: "Condensed deno lint diagnostics"

match:
    command: "deno"
    subcommand: "lint"

streams:
    - stdout
    - stderr

pipeline:
    - action: "strip_ansi"
    - action: "remove_lines"
      pattern: "^\\s*$"
    - action: "keep_lines"
      pattern: "(error|warning|Checked|Found|^[[:space:]]*at |^[[:space:]]*--> |^[[:space:]]*[0-9]+[[:space:]]*\\||^[[:space:]]*\\||\\^|✖|⚠)"
    - action: "compact_path"
    - action: "truncate_lines"
      max: 160
    - action: "head"
      n: 80
      overflow_msg: "... more lint diagnostics"
    - action: "on_empty"
      message: "ok (no lint errors)"

on_error: "passthrough"

tests:
    - name: "empty output means no lint errors"
      input: ""
      expected: |
          ok (no lint errors)
    - name: "lint error keeps diagnostic"
      input: |
          error[no-unused-vars]: `value` is never used
            --> /repo/src/file.js:1:7
             |
           1 | const value = 1;
             |       ^^^^^
          Found 1 problem
      expected: |
          error[no-unused-vars]: `value` is never used
            --> /repo/src/file.js:1:7
             |
           1 | const value = 1;
             |       ^^^^^
          Found 1 problem
