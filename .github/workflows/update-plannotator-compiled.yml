name: update-plannotator-compiled

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-plannotator-compiled
  cancel-in-progress: false

env:
  PACKAGE_NAME: "@gandazgul/plannotator-pi-extension-compiled"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check latest package version
        id: versions
        run: |
          set -euo pipefail

          latest="$(npm view "$PACKAGE_NAME" version)"
          current="$(
            node --input-type=module <<'NODE'
          import fs from "node:fs";

          const denoJson = JSON.parse(fs.readFileSync("deno.json", "utf8"));
          const spec = denoJson.imports?.["@gandazgul/plannotator-pi-extension-compiled"];
          if (!spec) {
            throw new Error("Missing @gandazgul/plannotator-pi-extension-compiled import in deno.json");
          }

          const match = spec.match(/@gandazgul\/plannotator-pi-extension-compiled@\^?([^/]+)/);
          if (!match) {
            throw new Error(`Could not parse current Plannotator compiled version from ${spec}`);
          }

          console.log(match[1]);
          NODE
          )"

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest" ]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "Already on latest $latest"
          else
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            echo "Update available: $current -> $latest"
          fi

      - name: Update deno.json
        if: steps.versions.outputs.has_update == 'true'
        env:
          LATEST_VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const filePath = "deno.json";
          const packageName = "@gandazgul/plannotator-pi-extension-compiled";
          const latest = process.env.LATEST_VERSION;
          const denoJson = JSON.parse(fs.readFileSync(filePath, "utf8"));

          const importKeys = [
            packageName,
            `${packageName}/server`,
            `${packageName}/assets`,
          ];

          for (const key of importKeys) {
            if (!denoJson.imports?.[key]) {
              throw new Error(`Missing ${key} import in ${filePath}`);
            }

            const subpath = key.slice(packageName.length);
            denoJson.imports[key] = `npm:${packageName}@^${latest}${subpath}`;
          }

          fs.writeFileSync(filePath, `${JSON.stringify(denoJson, null, 4)}\n`);
          NODE

      - name: Generate version file
        if: steps.versions.outputs.has_update == 'true'
        run: deno run --allow-run --allow-read --allow-write scripts/write-version.js

      - name: Update deno.lock
        if: steps.versions.outputs.has_update == 'true'
        run: deno cache --reload=npm:@gandazgul/plannotator-pi-extension-compiled src/cli.js

      - name: Create update commit
        if: steps.versions.outputs.has_update == 'true'
        id: commit
        env:
          LATEST_VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          if git diff --quiet -- deno.json deno.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No dependency file changes after update"
            exit 0
          fi

          branch="automation/update-plannotator-compiled-${LATEST_VERSION}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add deno.json deno.lock
          git commit -m "chore: update plannotator compiled to ${LATEST_VERSION}"
          git push --force-with-lease origin "$branch"

      - name: Close superseded update PRs
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          LATEST_VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          prs="$(
            gh pr list \
              --state open \
              --search "Update @gandazgul/plannotator-pi-extension-compiled in:title" \
              --json number,headRefName \
              --jq ".[] | select(.headRefName != \"$BRANCH\") | .number"
          )"

          if [ -z "$prs" ]; then
            echo "No superseded Plannotator update PRs to close"
            exit 0
          fi

          for pr in $prs; do
            gh pr close "$pr" \
              --comment "Superseded by automated update to ${LATEST_VERSION}." \
              --delete-branch || \
            gh pr close "$pr" \
              --comment "Superseded by automated update to ${LATEST_VERSION}."
          done

      - name: Open or update pull request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          CURRENT_VERSION: ${{ steps.versions.outputs.current }}
          LATEST_VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Updates \`@gandazgul/plannotator-pi-extension-compiled\` from \`${CURRENT_VERSION}\` to \`${LATEST_VERSION}\`.

          Files updated:
          - \`deno.json\`
          - \`deno.lock\`

          title="Update @gandazgul/plannotator-pi-extension-compiled to ${LATEST_VERSION}"
          existing_pr="$(
            gh pr list \
              --state open \
              --head "$BRANCH" \
              --json number \
              --jq '.[0].number'
          )"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "$title" \
              --body-file "$body_file" \
              --base "$BASE_BRANCH"
          else
            gh pr create \
              --title "$title" \
              --body-file "$body_file" \
              --base "$BASE_BRANCH" \
              --head "$BRANCH"
          fi
