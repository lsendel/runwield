name: release-wld

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      asset_suffix: darwin-arm64
                      binary_name: wld
                    - target: x86_64-apple-darwin
                      asset_suffix: darwin-x64
                      binary_name: wld
                    - target: x86_64-unknown-linux-gnu
                      asset_suffix: linux-x64
                      binary_name: wld
                    - target: aarch64-unknown-linux-gnu
                      asset_suffix: linux-arm64
                      binary_name: wld
                    - target: x86_64-pc-windows-msvc
                      asset_suffix: windows-x64
                      binary_name: wld.exe

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.9.2

            - name: Cache dependencies
              run: |
                  deno run -A scripts/write-version.js
                  deno cache scripts/compile.js src/cli.js

            - name: Compile binary
              run: deno run -A scripts/compile.js --target "${{ matrix.target }}" --output "${{ matrix.binary_name }}"

            - name: Smoke test native binary
              if: matrix.target == 'x86_64-unknown-linux-gnu'
              run: ./wld --version

            - name: Package artifact
              run: |
                  VERSION="${GITHUB_REF_NAME}"
                  ASSET_BASE="wld-${VERSION}-${{ matrix.asset_suffix }}"
                  tar -czf "${ASSET_BASE}.tar.gz" "${{ matrix.binary_name }}"
                  tar -cf - "${{ matrix.binary_name }}" | zstd -10 -T0 -o "${ASSET_BASE}.tar.zst"
                  sha256sum "${ASSET_BASE}.tar.gz" > "${ASSET_BASE}.tar.gz.sha256"
                  sha256sum "${ASSET_BASE}.tar.zst" > "${ASSET_BASE}.tar.zst.sha256"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wld-${{ matrix.asset_suffix }}
                  path: |
                      *.tar.gz
                      *.tar.zst
                      *.sha256

    release:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download matrix artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts
                  pattern: wld-*
                  merge-multiple: false

            - name: Consolidate checksums
              run: |
                  find release-artifacts -name "*.sha256" -exec cat {} \; > release-artifacts/SHA256SUMS

            - name: Publish release assets
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      release-artifacts/**/*.tar.gz
                      release-artifacts/**/*.tar.zst
                      release-artifacts/SHA256SUMS
                      config.schema.json
