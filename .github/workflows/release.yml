name: release-wld

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      asset_suffix: darwin-arm64
                      binary_name: wld
                    - target: x86_64-apple-darwin
                      asset_suffix: darwin-x64
                      binary_name: wld
                    - target: x86_64-unknown-linux-gnu
                      asset_suffix: linux-x64
                      binary_name: wld
                    - target: aarch64-unknown-linux-gnu
                      asset_suffix: linux-arm64
                      binary_name: wld
                    - target: x86_64-pc-windows-msvc
                      asset_suffix: windows-x64
                      binary_name: wld.exe

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Generate version file
              run: deno run --allow-run --allow-read --allow-write --allow-env=GITHUB_REF_TYPE,GITHUB_REF_NAME,GITHUB_REF scripts/write-version.js

            - name: Cache dependencies
              run: deno cache src/cli.js

            - name: Compile binary
              run: |
                  deno compile \
                    -A \
                    --target "${{ matrix.target }}" \
                    --include src/agent-definitions \
                    --include src/prompt-templates \
                    --include src/shared/session/SYSTEM_PROMPT_TEMPLATE.md \
                    --include src/skills \
                    --include src/agent-definitions/workflow-prompts/init-agent-prompt.md \
                    --include src/shared/ui/catppuccin-mocha.json \
                    --output "${{ matrix.binary_name }}" \
                    src/cli.js

            - name: Package artifact
              run: |
                  VERSION="${GITHUB_REF_NAME}"
                  ASSET="wld-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"
                  tar -czf "$ASSET" "${{ matrix.binary_name }}"
                  sha256sum "$ASSET" > "$ASSET.sha256"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wld-${{ matrix.asset_suffix }}
                  path: |
                      *.tar.gz
                      *.sha256

    release:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download matrix artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts
                  pattern: wld-*
                  merge-multiple: false

            - name: Consolidate checksums
              run: |
                  find release-artifacts -name "*.sha256" -exec cat {} \; > release-artifacts/SHA256SUMS

            - name: Publish release assets
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      release-artifacts/**/*.tar.gz
                      release-artifacts/SHA256SUMS
