<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 120 120"
    width="100%"
    height="100%"
>
    <g transform="translate(10, 10)">
        <path
            d="M 0 0 h 20 v 40 h 20 v -40 h 20 v 100 h -20 v -40 h -20 v 40 h -20 z"
            fill="#209fb5"
        />

        <rect x="80" y="80" width="20" height="20" fill="#209fb5">
            <animate
                attributeName="opacity"
                values="1;0;1"
                keyTimes="0;0.5;1"
                calcMode="discrete"
                dur="1.3s"
                repeatCount="indefinite"
            />
        </rect>
    </g>
</svg>
